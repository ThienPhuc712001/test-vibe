version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: marketplace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - marketplace-network

  redis:
    image: redis:7-alpine
    container_name: marketplace-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - marketplace-network

  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: marketplace-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - marketplace-network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: marketplace-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/marketplace
      REDIS_URL: redis://redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: masterKey
    ports:
      - "3002:3002"
    volumes:
      - ./packages/backend:/app/packages/backend
      - ./packages/db:/app/packages/db
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
    depends_on:
      - postgres
      - redis
      - meilisearch
    networks:
      - marketplace-network

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: marketplace-web
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3002
      NEXT_PUBLIC_WS_URL: ws://localhost:3002
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/ui:/app/packages/ui
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - marketplace-network

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
    container_name: marketplace-admin
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3002
    ports:
      - "3001:3001"
    volumes:
      - ./apps/admin:/app/apps/admin
      - ./packages/ui:/app/packages/ui
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - marketplace-network

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:

networks:
  marketplace-network:
    driver: bridge